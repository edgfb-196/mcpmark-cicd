name: Deployment Status Workflow

on:
  push:
    branches: [ main ]

jobs:
  pre-deployment:
    runs-on: ubuntu-latest
    outputs:
      issue_number: ${{ steps.create-issue.outputs.result }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Get previous commit SHA
        id: prev-commit
        run: echo "prev_sha=$(git rev-parse HEAD~1)" >> $GITHUB_OUTPUT

      - name: Get package version
        id: package-version
        run: echo "version=$(jq -r '.version' package.json)" >> $GITHUB_OUTPUT

      - name: Create deployment issue
        id: create-issue
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Deployment Tracking - ${context.sha}`,
              body: `Deployment started for commit ${context.sha}`,
              labels: ['deployment', 'in-progress']
            });
            return issue.number;

      - name: Save issue number
        run: echo "ISSUE_NUMBER=${{ steps.create-issue.outputs.result }}" >> $GITHUB_ENV

      - name: Post pre-deployment comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ env.ISSUE_NUMBER }},
              body: "Pre-deployment checks completed"
            });

  rollback-preparation:
    needs: pre-deployment
    runs-on: ubuntu-latest
    outputs:
      checksum: ${{ steps.checksum.outputs.checksum }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set issue number
        run: echo "ISSUE_NUMBER=${{ needs.pre-deployment.outputs.issue_number }}" >> $GITHUB_ENV

      - name: Get previous commit SHA
        id: prev-commit
        run: echo "prev_sha=$(git rev-parse HEAD~1)" >> $GITHUB_OUTPUT

      - name: Get package version
        id: package-version
        run: echo "version=$(jq -r '.version' package.json)" >> $GITHUB_OUTPUT

      - name: Create rollback script
        run: |
          cat > rollback.sh << 'EOF'
          #!/bin/bash
          set -e

          echo "Starting rollback to previous commit..."
          git checkout ${{ steps.prev-commit.outputs.prev_sha }}
          npm ci
          echo "Rollback completed successfully"
          EOF
          chmod +x rollback.sh

      - name: Create configuration backups
        run: |
          mkdir -p rollback-backups
          cp package.json rollback-backups/
          cp package-lock.json rollback-backups/
          if [ -f .env.example ]; then
            cp .env.example rollback-backups/
          fi

      - name: Create dependency verification script
        run: |
          cat > verify-dependencies.sh << 'EOF'
          #!/bin/bash
          set -e

          echo "Verifying dependencies..."
          npm audit
          echo "Dependencies verified successfully"
          EOF
          chmod +x verify-dependencies.sh

      - name: Create rollback documentation
        run: |
          cat > ROLLBACK_GUIDE.md << 'EOF'
          # Rollback Guide

          ## Step-by-Step Rollback Instructions

          1. Stop the running application
          2. Run the rollback script: `./rollback.sh`
          3. Verify the application is running correctly
          4. Check logs for any errors
          EOF

      - name: Create compressed rollback package
        run: |
          tar -czf rollback-package-${{ github.sha }}.tar.gz rollback.sh verify-dependencies.sh rollback-backups ROLLBACK_GUIDE.md
          sha256sum rollback-package-${{ github.sha }}.tar.gz > rollback-package-${{ github.sha }}.tar.gz.sha256

      - name: Upload rollback artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rollback-package-${{ github.sha }}
          path: |
            rollback-package-${{ github.sha }}.tar.gz
            rollback-package-${{ github.sha }}.tar.gz.sha256
          retention-days: 30

      - name: Get SHA256 checksum
        id: checksum
        run: echo "checksum=$(cat rollback-package-${{ github.sha }}.tar.gz.sha256 | awk '{print $1}')" >> $GITHUB_OUTPUT

      - name: Post rollback plan comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ env.ISSUE_NUMBER }},
              body: `# 🔄 Rollback Plan Ready

            ## Deployment Details
            - Previous Commit: ${{ steps.prev-commit.outputs.prev_sha }}
            - Current Commit: ${{ github.sha }}
            - Package Version: ${{ steps.package-version.outputs.version }}
            - Artifact: rollback-package-${{ github.sha }}

            ## Completed Components
            ✅ Rollback script created
            ✅ Configuration backups
            ✅ Dependency verification script
            ✅ Rollback documentation
            ✅ Compressed rollback package with checksums

            ## Quick Rollback Command
            \`\`\`bash
            # Download and extract rollback package
            wget https://github.com/${{ context.repo.owner }}/${{ context.repo.repo }}/actions/runs/${{ github.run_id }}/artifacts/$(gh run view ${{ github.run_id }} --json artifacts --jq '.artifacts[] | select(.name == "rollback-package-${{ github.sha }}") | .id')
            tar -xzf rollback-package-${{ github.sha }}.tar.gz
            ./rollback.sh
            \`\`\`

            ## Verification Status
            - Rollback script created: true
            - Configuration backup: true
            - SHA256: ${{ steps.checksum.outputs.checksum }}`
            });

  post-deployment:
    needs: rollback-preparation
    runs-on: ubuntu-latest
    steps:
      - name: Set issue number
        run: echo "ISSUE_NUMBER=${{ needs.pre-deployment.outputs.issue_number }}" >> $GITHUB_ENV

      - name: Update issue labels
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ env.ISSUE_NUMBER }},
              name: 'in-progress'
            });
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ env.ISSUE_NUMBER }},
              labels: ['completed']
            });

      - name: Post final comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ env.ISSUE_NUMBER }},
              body: `Deployment Completed Successfully

            Rollback artifact details:
            - Artifact: rollback-package-${{ github.sha }}
            - SHA256: ${{ needs.rollback-preparation.outputs.checksum }}`
            });

      - name: Close deployment issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ env.ISSUE_NUMBER }},
              state: 'closed'
            });
